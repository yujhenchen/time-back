<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Blocked</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #fafafa;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #666; margin-bottom: 0; }
    .url { font-family: monospace; background: #eee; padding: 0.25rem 0.5rem; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>This site is blocked</h1>
    <p>time-guard has blocked this site.</p>
    <p id="blocked-url"></p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const url = params.get("url");
    if (url) {
      document.getElementById("blocked-url").innerHTML = "<span class=\"url\">" + url + "</span>";
    }
  </script>
</body>
</html>
